# This is a Databricks asset bundle definition for kraft_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: kraft_asset_bundle
  uuid: 5c4ed34c-61b4-4e5d-b09c-a7cc3d98142d

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-b4ece798-9480.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-b4ece798-9480.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/kraft6@live.com to make sure we only have a single copy.
      root_path: /Workspace/Users/kraft6@live.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: kraft6@live.com
        level: CAN_MANAGE
